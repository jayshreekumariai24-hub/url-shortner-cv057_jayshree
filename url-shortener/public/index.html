<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart URL Shortener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen py-12 px-4">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold text-white mb-4 drop-shadow-lg">🔗 Smart URL Shortener</h1>
      <p class="text-xl text-indigo-100 mb-8">Shorten URLs with powerful analytics</p>
    </div>

    <!-- Shorten Form -->
    <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-8 mb-12 border border-white/50">
      <form id="shortenForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Enter URL to shorten</label>
          <div class="flex gap-3">
            <input 
              type="text" 
              inputmode="url"
              name="url" 
              id="urlInput" 
              placeholder="https://example.com" 
              required
              class="flex-1 px-5 py-4 border border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-500 focus:border-transparent shadow-lg transition-all duration-300"
            >
            <label class="sr-only">Expires in</label>
            <select name="expiresInDays" class="px-5 py-4 border border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-500 shadow-lg">
              <option value="7">7 days</option>
              <option value="30">30 days</option>
              <option value="90">90 days</option>
              <option value="365">1 year</option>
            </select>
            <button 
              type="submit"
              class="px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 focus:ring-4 focus:ring-indigo-500"
            >
              Shorten
            </button>
          </div>
        </div>
        <div id="result" class="hidden bg-green-100 border border-green-400 rounded-xl p-4"></div>
        <div id="error" class="hidden bg-red-100 border border-red-400 rounded-xl p-4"></div>
      </form>
    </div>

    <!-- Links Dashboard -->
    <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-white/50">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">📊 Your Short Links</h2>
        <button 
          id="refreshLinksBtn"
          type="button"
          class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition-colors"
        >
          🔄 Refresh
        </button>
      </div>
      <div id="linksTable" class="overflow-x-auto">
        <table class="w-full table-fixed">
          <thead>
            <tr class="bg-gray-50">
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Short Link</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Original</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Clicks</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Expires</th>
            </tr>
          </thead>
          <tbody id="linksBody" class="divide-y divide-gray-200">
            <!-- Loaded dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
